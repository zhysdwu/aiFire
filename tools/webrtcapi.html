<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveTalking 数字人</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1418;
    color: #c8d6e5;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .avatar-placeholder {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2d5a4b, #1a3a2e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 12px;
  }
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #27ae60;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-text { font-size: 13px; color: #8bc4bb; }
  .btn-start {
    border: 1px solid #7bcfc4;
    border-radius: 8px;
    background: transparent;
    color: #7bcfc4;
    padding: 6px 16px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .btn-start:hover { background: rgba(123, 207, 196, 0.1); }
  .tip { font-size: 11px; color: #5d6d7e; margin-top: 6px; }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 0;
  }
</style>
</head>
<body>
  <div id="placeholder">
    <div class="avatar-placeholder">👤</div>
    <div class="status-bar">
      <div class="dot"></div>
      <span class="status-text">数字人待命中</span>
    </div>
    <button class="btn-start" onclick="this.textContent='已就绪'; this.disabled=true;">Start</button>
    <p class="tip">开发模式 · LiveTalking Stub</p>
  </div>
  <script>
    console.log('LiveTalking WebRTC stub loaded');
  </script>
</body>
</html>
